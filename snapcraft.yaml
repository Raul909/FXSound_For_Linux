name: fxsound-linux
base: core22
version: '1.0.0'
summary: Audio enhancer with 10-band EQ and effects
description: |
  A free, open-source audio enhancer for Linux with a 10-band equalizer,
  effects, presets, and real-time audio visualization.

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  fxsound-linux:
    command: bin/fxsound-linux
    extensions: [gnome]
    plugs:
      - audio-playback
      - audio-record
      - pulseaudio
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl

parts:
  fxsound-linux:
    plugin: rust
    source: https://github.com/Raul909/FXSound_For_Linux.git
    source-tag: v1.0.0
    build-packages:
      - libpulse-dev
      - libssl-dev
      - pkg-config
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - curl
      - wget
    stage-packages:
      - libpulse0
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
    override-build: |
      # Install Node.js
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      
      # Build frontend
      npm install
      npm run build
      
      # Build Tauri app
      cd src-tauri
      cargo build --release
      
      # Install binary
      install -Dm755 target/release/fxsound-linux $SNAPCRAFT_PART_INSTALL/bin/fxsound-linux
